<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Terrain Engine - Civilization & Ecology</title>
    <style>
        body { background: #1a1a1a; color: #e0e0e0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #controls { background: #2a2a2a; padding: 15px; border-radius: 5px; margin-bottom: 10px; width: 620px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        #container { position: relative; border: 2px solid #444; line-height: 0; }
        canvas { image-rendering: pixelated; cursor: crosshair; }
        #info-panel { width: 620px; background: #2a2a2a; padding: 15px; margin-top: 10px; border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .stat { color: #00ffcc; font-weight: bold; }
        input[type="number"] { background: #333; color: #fff; border: 1px solid #555; padding: 5px; width: 80px; }
        button { background: #006655; color: white; border: none; padding: 8px 12px; cursor: pointer; font-family: inherit; border-radius: 3px; font-size: 0.8em; margin: 2px; }
        button:hover { background: #008877; }
        textarea { width: 95%; height: 60px; background: #111; color: #fff; border: 1px solid #444; padding: 10px; font-family: inherit; resize: none; }
        .info-row { font-size: 0.85em; margin-top: 5px; border-top: 1px solid #444; padding-top: 5px; white-space: pre-wrap; }
        .village-info { color: #ff66aa; }
        .animal-info { color: #00ffcc; }
        .tamed-info { color: #ff00ff; }
        .file-btn { background: #444; }
    </style>
</head>
<body>

<h2>Terrain Engine: ERD Ecology</h2>

<div id="controls">
    <span>Seed:</span>
    <input type="number" id="seedInput" value="12345">
    <button onclick="generateMap()">再生成</button>
    <button onclick="randomGenerate()">ランダム</button>
    <button class="file-btn" onclick="exportWorld()">保存(JSON)</button>
    <input type="file" id="importFile" style="display:none" onchange="importWorld(event)">
    <button class="file-btn" onclick="document.getElementById('importFile').click()">読込</button>
    <button style="background:#884400" onclick="toggleBuildMode()" id="buildBtn">建築モード: OFF</button>
</div>

<div id="container">
    <canvas id="mapCanvas" width="520" height="520"></canvas>
</div>

<div id="info-panel">
    <div>
        座標: <span id="pos" class="stat">-</span> | バイオーム: <span id="biome" class="stat">-</span>
    </div>
    <div style="margin-top:10px;">
        <textarea id="memoInput" placeholder="メモを入力..." oninput="saveMemo()"></textarea>
    </div>
    <div class="info-row village-info" id="villageArea">集落情報: なし</div>
    <div class="info-row tamed-info" id="tamedArea">飼いならした生物: なし</div>
    <div class="info-row animal-info" id="animalArea"></div>
</div>

<script>
const SIZE = 65; 
const TILE_SIZE = 8;
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

let heightMap, humidityMap, riverMap, villages = [];
let roadMap;
let animals = [];
let bases = [];
let buildMode = false;
let worldData = { seed: 12345, memos: {}, bases: [], animals: [] };
let selectedPos = { x: 0, y: 0 };

// --- ERD (Emotion Reproduction Device) ---
const ERD = {
    emotionData: ["憂鬱", "疲れ", "リラックス", "惨め", "混乱", "嬉しい", "緊張", "覚醒", "感動", "悲しい", "眠たい", "落ち着き", "イライラ", "平穏", "満足", "怒り", "興奮", "歓喜", "うんざり", "無関心", "安心", "不快", "達観", "楽しい", "警戒", "驚き", "感謝"],
    clampIndex: (v) => v <= -0.33 ? 0 : (v >= 0.33 ? 2 : 1),
    analyzeEmotion: (input, id) => {
        const s = id;
        const getW = (o) => seededRandom(s + o) * 2 - 1;
        let i = [0,0,0,0].map((_,idx)=> (input.a*getW(idx*3)) + (input.b*getW(idx*3+1)) + (input.hr*getW(idx*3+2)));
        let o = [0,0,0].map((_,idx)=> (i[0]*getW(12+idx*4)) + (i[1]*getW(13+idx*4)) + (i[2]*getW(14+idx*4)) + (i[3]*getW(15+idx*4)));
        return ERD.clampIndex(o[0]) + (ERD.clampIndex(o[1]) * 3) + (ERD.clampIndex(o[2]) * 9);
    },
    getMovementVector: (idx) => {
        const emo = ERD.emotionData[idx];
        if (["興奮", "歓喜", "怒り", "警戒", "驚き"].includes(emo)) return { dx: Math.floor(Math.random()*3)-1, dy: Math.floor(Math.random()*3)-1 };
        if (["落ち着き", "平穏", "眠たい", "無関心"].includes(emo)) return { dx: 0, dy: 0 };
        return Math.random() > 0.7 ? { dx: Math.floor(Math.random()*3)-1, dy: Math.floor(Math.random()*3)-1 } : { dx: 0, dy: 0 };
    }
};

const ANIMAL_TYPES = {
    COW: { name: "牛", color: "#2a2a2a", maxAge: 200, breedAge: 10, spawn: (h, hum) => h > 0.45 && h < 0.65 && hum > 0.4 },
    SHEEP: { name: "羊", color: "#ffffff", maxAge: 150, breedAge: 7, spawn: (h, hum) => h > 0.45 && h < 0.75 && hum < 0.6 },
    PIG: { name: "豚", color: "#ffc0cb", maxAge: 150, breedAge: 6, spawn: (h, hum) => h > 0.45 && h < 0.6 && hum > 0.5 },
    CHICKEN: { name: "鶏", color: "#ffffcc", maxAge: 80, breedAge: 4, spawn: (h, hum) => h > 0.45 && h < 0.7 },
    WOLF: { name: "狼", color: "#a9a9a9", maxAge: 240, breedAge: 12, spawn: (h, hum) => h > 0.5 && hum > 0.3 && hum < 0.8 },
    FISH: { name: "魚", color: "#add8e6", maxAge: 60, breedAge: 1, spawn: (h, hum) => h < 0.4 }
};

function seededRandom(seed) { let x = Math.sin(seed) * 10000; return x - Math.floor(x); }

function diamondSquare(size, roughness, seed) {
    let map = Array.from({ length: size }, () => new Float32Array(size));
    let s = seed; const getRand = () => { s += 0.1; return seededRandom(s); };
    map[0][0] = getRand(); map[0][size-1] = getRand(); map[size-1][0] = getRand(); map[size-1][size-1] = getRand();
    for (let side = size - 1; side >= 2; side /= 2) {
        let half = side / 2, scale = roughness * side;
        for (let y = half; y < size; y += side) for (let x = half; x < size; x += side) {
            map[y][x] = (map[y-half][x-half] + map[y-half][x+half] + map[y+half][x-half] + map[y+half][x+half]) / 4 + (getRand()*2-1)*scale;
        }
        for (let y = 0; y < size; y += half) for (let x = (y + half) % side; x < size; x += side) {
            let avg = 0, count = 0;
            [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dy,dx]) => {
                let ny=y+dy*half, nx=x+dx*half;
                if(ny>=0&&ny<size&&nx>=0&&nx<size){ avg+=map[ny][nx]; count++; }
            });
            map[y][x] = (avg/count) + (getRand()*2-1)*scale;
        }
    }
    return map;
}


// --- 村人データ生成 ---
function createVillagerData(seed) {
    const id = Math.floor(seededRandom(seed) * 1000000);
    const names = ["アル", "ベータ", "ガマ", "デル", "エプ", "ゼタ", "イオ"];
    const roles = ["農夫", "狩人", "職人", "司祭", "守護者"];
    const brainInput = { a: seededRandom(seed+1), b: seededRandom(seed+2), hr: seededRandom(seed+3) };
    return {
        id, name: names[Math.floor(seededRandom(seed+4)*names.length)] + "・" + id.toString().slice(-3),
        role: roles[Math.floor(seededRandom(seed+5)*roles.length)],
        sex: seededRandom(seed+6)>0.5?"M":"F", age: Math.floor(seededRandom(seed+7)*40)+18,
        brainInput, emotionIdx: ERD.analyzeEmotion(brainInput, id)
    };
}

function generateRiverAndVillages(hMap, seed) {
    let rMap = Array.from({ length: SIZE }, () => new Int8Array(SIZE).fill(0));
    let vList = [], s = seed;
    let startX = 32, startY = 32;
    let current = {x: startX, y: startY}, visited = new Set();
    for (let i = 0; i < 400; i++) {
        rMap[current.y][current.x] = 1; visited.add(`${current.x},${current.y}`);
        let n = [[0,1],[0,-1],[1,0],[-1,0]].map(([dy,dx])=>({x:current.x+dx, y:current.y+dy}))
                  .filter(p=>p.x>=0&&p.x<SIZE&&p.y>=0&&p.y<SIZE)
                  .sort((a,b)=> hMap[a.y][a.x] - hMap[b.y][b.x])[0];
        if(!n || hMap[n.y][n.x] < 0.3) break;
        current = n;
    }
    for (let i = 0; i < 50; i++) {
        let vx = Math.floor(seededRandom(s++) * SIZE), vy = Math.floor(seededRandom(s++) * SIZE);
        if (hMap[vy][vx] > 0.46 && hMap[vy][vx] < 0.6) {
            let residents = [];
            // 村の人数を 5〜20人の間でランダムに決定
            const popSize = Math.floor(seededRandom(s++) * 16) + 5; 
            for(let j = 0; j < popSize; j++) {
                residents.push(createVillagerData(s++));
            }
            vList.push({ x: vx, y: vy, residents: residents }); 
            if (vList.length >= 3) break;
    }
    }
    return {rMap, vList};
}

function generateRoads(vList, hMap) {
    if (vList.length < 2) return;

    for (let i = 0; i < vList.length - 1; i++) {
        let start = vList[i];
        let end = vList[i + 1];
        
        // 簡易的なパスファインディング（現在の地点から目標へ一歩ずつ進む）
        let curr = { x: start.x, y: start.y };
        let timeout = 0;

        while ((curr.x !== end.x || curr.y !== end.y) && timeout < 200) {
            timeout++;
            let next = { x: curr.x, y: curr.y };
            let minDist = Infinity;

            // 周囲8マスを調査
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    if (dx === 0 && dy === 0) continue;
                    let nx = curr.x + dx, ny = curr.y + dy;
                    
                    if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE) {
                        // コスト計算：目標への距離 + 地形の険しさ（水場は高コスト）
                        let terrainCost = hMap[ny][nx] < 0.45 ? 10 : 1; 
                        let d = Math.sqrt((nx - end.x)**2 + (ny - end.y)**2) + terrainCost;
                        
                        if (d < minDist) {
                            minDist = d;
                            next = { x: nx, y: ny };
                        }
                    }
                }
            }
            curr = next;
            roadMap[curr.y][curr.x] = 1; // 道を設置
        }
    }
}

function createAnimalObject(type, x, y, s, parents = null) {
    const id = Date.now() + Math.floor(seededRandom(s)*1000);
    const brainInput = { a: seededRandom(s+10), b: seededRandom(s+20), hr: seededRandom(s+30) };
    return { id, type, x, y, tamed: false, sex: seededRandom(s+40)>0.5?"M":"F", age: Math.floor(seededRandom(s+50)*10), parents, brainInput, emotionIdx: ERD.analyzeEmotion(brainInput, id), breedCooldown: 0 };
}

function getBiome(h, hum) {
    if (h < 0.3) return { name: "深海", color: "#000044" };
    if (h < 0.4) return { name: "浅瀬", color: "#0044bb" };
    if (h < 0.45) return { name: "砂浜", color: "#d2b48c" };
    if (h > 0.8) return { name: "高山", color: "#ffffff" };
    return hum > 0.5 ? { name: "森林", color: "#004400" } : { name: "平原", color: "#228b22" };
}

// --- JSON出力共通ロジック ---
function downloadEntityJSON(data, type) {
    const stats = { spade: Math.floor(data.brainInput.a*10)+1, diamond: Math.floor(data.brainInput.b*10)+1, club: Math.floor(data.brainInput.hr*10)+1, heart: (data.id%10)+1 };
    const sheet = {
        name: data.name || `${ANIMAL_TYPES[data.type].name}_${data.id}`,
        description: `${type}データ。感情[${ERD.emotionData[data.emotionIdx]}]`,
        origin_system: "Terrain Engine (ERD)",
        base_stats: stats,
        systems_config: { TRPG: { stat_names: { spade:"STR", diamond:"INT", club:"VIT", heart:"LUK" }, equipment: [], storage: { backpack:[], warehouse:[] } } }
    };
    const blob = new Blob([JSON.stringify(sheet, null, 2)], {type: "application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${type}_${sheet.name}.json`; a.click();
}

function generateMap(newSeed = null, isImport = false) {
    const seed = newSeed || parseInt(document.getElementById('seedInput').value);
    document.getElementById('seedInput').value = seed;
    heightMap = diamondSquare(SIZE, 0.02, seed);
    humidityMap = diamondSquare(SIZE, 0.03, seed + 500);
    let res = generateRiverAndVillages(heightMap, seed + 1000);
    riverMap = res.rMap; villages = res.vList;
    roadMap = Array.from({ length: SIZE }, () => new Int8Array(SIZE).fill(0));
    generateRoads(villages, heightMap);
    // generateMap 関数の中にある動物生成部分を以下に差し替え
    if (!isImport) {
        animals = [];
        bases = [];
        let s = seed + 2000;
        for(let i=0; i<80; i++) { // 少し数を増やす
            let x = Math.floor(seededRandom(s++) * SIZE);
            let y = Math.floor(seededRandom(s++) * SIZE);
            let h = heightMap[y][x], hum = humidityMap[y][x];
        
            // 全ての動物種に対してスポーン判定を行う
            for(let type in ANIMAL_TYPES) {
                if(ANIMAL_TYPES[type].spawn(h, hum)) {
                    animals.push(createAnimalObject(type, x, y, s++));
                    break; // その場所に1匹生まれたら次のループへ
                }
            }
        }
    }
    updateUI(); draw();
}

function randomGenerate() { generateMap(Math.floor(Math.random()*100000)); }

function toggleBuildMode() { 
    buildMode = !buildMode; 
    const btn = document.getElementById('buildBtn');
    btn.innerText = "建築モード: " + (buildMode ? "ON" : "OFF");
    btn.style.background = buildMode ? "#ff4400" : "#884400"; 
}

function draw() {
    ctx.clearRect(0,0,520,520);
    for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) {
        ctx.fillStyle = getBiome(heightMap[y][x], humidityMap[y][x]).color;
        ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        if (roadMap[y][x]) { 
            ctx.fillStyle = "#554433"; // 道の色（茶色系）
            ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE); 
        }
        if(riverMap[y][x]) { ctx.fillStyle="#00ffff"; ctx.fillRect(x*TILE_SIZE+2,y*TILE_SIZE+2,4,4); }
    }
    // 拠点の描画
    bases.forEach(b => {
        ctx.font = "12px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        // 拠点を絵文字で表現
        ctx.fillText("🏠", b.x * TILE_SIZE + 4, b.y * TILE_SIZE + 4);
    });
    // 動物の描画
    animals.forEach(a => {
        ctx.fillStyle = a.tamed ? "#ff00ff" : (a.age < 5 ? "#ffff00" : ANIMAL_TYPES[a.type].color);
        if(a.sex==="M") ctx.fillRect(a.x*TILE_SIZE+2, a.y*TILE_SIZE+2, 4, 4);
        else { ctx.beginPath(); ctx.arc(a.x*TILE_SIZE+4, a.y*TILE_SIZE+4, 2, 0, 7); ctx.fill(); }
    });
    // 集落の描画
    villages.forEach(v => {
        ctx.fillStyle = "#ff0077";
        ctx.beginPath();
        ctx.arc(v.x * TILE_SIZE + 4, v.y * TILE_SIZE + 4, 4, 0, 7);
        ctx.fill();
    });

    // 選択枠
    ctx.strokeStyle = "#ffff00";
    ctx.strokeRect(selectedPos.x * TILE_SIZE, selectedPos.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
}

// --- 生態系アップデート ---
setInterval(() => {
    if(!heightMap) return;
    let newBabies = [], deadIds = new Set();
    const counts = {}; // 現在の種ごとの数を集計
    animals.forEach(a => counts[a.type] = (counts[a.type] || 0) + 1);

    animals.forEach(a => {
        const def = ANIMAL_TYPES[a.type];
        // 1. 寿命 (飼いならしは5倍)
        const maxAge = a.tamed ? def.maxAge * 5 : def.maxAge;
        a.age += (animals.length > 80 ? 5 : 1);

        // 2. 狼の捕食
        if(a.type === 'WOLF' && !a.tamed) {
            let prey = animals.find(p => p.id!==a.id && !p.tamed && Math.abs(p.x-a.x)<=1 && Math.abs(p.y-a.y)<=1);
            if(prey) { deadIds.add(prey.id); a.age = Math.max(0, a.age - 20); }
        }

        if(a.age > maxAge) deadIds.add(a.id);

        // 3. 移動
        let vec = ERD.getMovementVector(a.emotionIdx);
        let nx = a.x + vec.dx, ny = a.y + vec.dy;
        if(nx>=0&&nx<SIZE&&ny>=0&&ny<SIZE && heightMap[ny][nx]>0.4) { a.x=nx; a.y=ny; }

        // 4. 繁殖
        if (a.sex === "F" && a.breedCooldown === 0 && (counts[a.type] || 0) < 20) {
            let p = animals.find(p => p.type === a.type && p.sex === "M" && Math.abs(p.x - a.x) <= 1);
            if(p) { 
                newBabies.push(createAnimalObject(a.type, a.x, a.y, Math.random()));
                a.breedCooldown = 40; 
                counts[a.type]++;
            }
        } else if(a.breedCooldown>0) a.breedCooldown--;
    });
    animals = animals.filter(a => !deadIds.has(a.id)).concat(newBabies);
    // setInterval の最後（ animals = animals.filter... の直後）に追加
    if (animals.length < 30) { 
        let s = Math.random();
        let x = Math.floor(Math.random() * SIZE), y = Math.floor(Math.random() * SIZE);
        let h = heightMap[y][x], hum = humidityMap[y][x];
        for(let type in ANIMAL_TYPES) {
            if(ANIMAL_TYPES[type].spawn(h, hum)) {
                animals.push(createAnimalObject(type, x, y, s));
                break;
            }
        }
    }
    // setInterval の最後に追加
    Object.keys(ANIMAL_TYPES).forEach(type => {
    if ((counts[type] || 0) <= 5) {
        let s = Math.random();
        // 100回試行して適合するバイオームを探す
        for(let i=0; i<100; i++) {
            let rx = Math.floor(Math.random() * SIZE), ry = Math.floor(Math.random() * SIZE);
            if (ANIMAL_TYPES[type].spawn(heightMap[ry][rx], humidityMap[ry][rx])) {
                animals.push(createAnimalObject(type, rx, ry, s));
                break; 
            }
        }
    }
});
}, 1500);

canvas.addEventListener('click', (e) => {
    const r = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - r.left) / TILE_SIZE);
    const y = Math.floor((e.clientY - r.top) / TILE_SIZE);
    selectedPos = { x, y };

    if (buildMode) {
        // 建築モードONの時：拠点の設置または撤去
        const baseIdx = bases.findIndex(b => b.x === x && b.y === y);
        if (baseIdx === -1) {
            bases.push({ x, y });
        } else {
            bases.splice(baseIdx, 1); // 既にあったら撤去
        }
    } else {
        // 建築モードOFFの時：動物の飼いならし
        let a = animals.find(ani => ani.x === x && ani.y === y);
        if (a) a.tamed = !a.tamed;
    }
    updateUI();
});

function updateUI() {
    const {x,y} = selectedPos;
    document.getElementById('pos').innerText = `X:${x}, Y:${y}`;
    document.getElementById('biome').innerText = getBiome(heightMap[y][x], humidityMap[y][x]).name;

    // 村人表示
    let v = villages.find(v => v.x === x && v.y === y);
    const vArea = document.getElementById('villageArea');
    if (v) {
        // クリックのたびに、その村の全住人からランダムに一人選ぶ (Math.random使用)
        const randomIndex = Math.floor(Math.random() * v.residents.length);
        const res = v.residents[randomIndex];
    
        vArea.innerHTML = `
            <strong>集落検知: ${v.residents.length}名居住</strong><br>
            住民: ${res.name} / 職業: ${res.role} / 年齢: ${res.age}<br>
            感情: ${ERD.emotionData[res.emotionIdx]} 
            <button onclick='downloadEntityJSON(villages.find(v=>v.x===${x}&&v.y===${y}).residents[${randomIndex}], "Villager")'>
                この村人のJSONを出力
            </button>
        `;
    } else {
        vArea.innerText = "集落情報: なし";
    }

    // 動物表示
    let ani = animals.find(a => a.x===x && a.y===y);
    const aArea = document.getElementById('animalArea');
    if(ani) {
        let txt = `【生物】${ANIMAL_TYPES[ani.type].name} (${ani.sex}) Age:${ani.age} 感情:${ERD.emotionData[ani.emotionIdx]}`;
        if(ani.tamed) txt += ` [飼養中] <button onclick='downloadEntityJSON(animals.find(a=>a.x===${x}&&a.y===${y}), "Animal")'>JSON出力</button>`;
        aArea.innerHTML = txt;
    } else aArea.innerText = "";
}

function saveMemo() { worldData.memos[`${selectedPos.x},${selectedPos.y}`] = document.getElementById('memoInput').value; }
function exportWorld() { 
    worldData.animals = animals;
    const blob = new Blob([JSON.stringify(worldData)], {type:"application/json"});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`world.json`; a.click();
}
function importWorld(e) {
    const reader = new FileReader();
    reader.onload = (ev) => { worldData = JSON.parse(ev.target.result); animals = worldData.animals; generateMap(worldData.seed, true); };
    reader.readAsText(e.target.files[0]);
}

generateMap();
function ani() { draw(); requestAnimationFrame(ani); }
ani();
</script>
</body>
</html>
