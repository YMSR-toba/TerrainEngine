<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Terrain Engine</title>
    <style>
        body { background: #1a1a1a; color: #e0e0e0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #controls { background: #2a2a2a; padding: 15px; border-radius: 5px; margin-bottom: 10px; width: 750px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: center; }
        #container { position: relative; border: 2px solid #444; line-height: 0; box-shadow: 0 0 15px rgba(0,255,204,0.2); }
        canvas { image-rendering: pixelated; cursor: crosshair; background: #000; }
        #info-panel { width: 750px; background: #2a2a2a; padding: 15px; margin-top: 10px; border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .stat { color: #00ffcc; font-weight: bold; }
        .axis-group { display: flex; align-items: center; gap: 5px; background: #111; padding: 2px 8px; border-radius: 3px; border: 1px solid #444; }
        .axis-label { color: #ff66aa; font-weight: bold; font-size: 0.9em; }
        input[type="number"] { background: #111; color: #00ffcc; border: none; width: 50px; outline: none; }
        button { background: #006655; color: white; border: none; padding: 8px 12px; cursor: pointer; font-family: inherit; border-radius: 3px; font-size: 0.8em; }
        button:hover { background: #008877; }
        textarea { width: 95%; height: 50px; background: #111; color: #fff; border: 1px solid #444; padding: 10px; font-family: inherit; resize: none; }
        .info-row { font-size: 0.85em; margin-top: 5px; border-top: 1px solid #444; padding-top: 5px; white-space: pre-wrap; }
        .tier-display { font-size: 0.8em; padding: 2px 8px; border-radius: 10px; margin-left: 10px; }
        .tier-low { background: #4b0082; }
        .tier-med { background: #004400; }
        .tier-high { background: #444; border: 1px solid #00ffcc; }
        .v-toggle { background: #555; width: 90px; }
        .v-active { background: #aa0044; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<h2>Terrain Engine</h2>

<div id="controls">
    <div class="axis-group"><span class="axis-label">X</span><input type="number" id="axisX" value="11" min="1" max="21"></div>
    <div class="axis-group"><span class="axis-label">Y</span><input type="number" id="axisY" value="0"></div>
    <div class="axis-group"><span class="axis-label">Z</span><input type="number" id="axisZ" value="0"></div>
    <div class="axis-group"><span class="axis-label">W</span><input type="number" id="axisW" value="0"></div>
    <div class="axis-group"><span class="axis-label">U</span><input type="number" id="seedInput" value="12345"></div>
    <button id="vBtn" class="v-toggle" onclick="toggleV()">V: OFF</button>
    <button onclick="generateMap()">解析/生成</button>
    <button onclick="randomGenerate()">ランダム</button>
    <button style="background:#444" onclick="exportWorld()">保存</button>
    <button style="background:#884400" onclick="toggleBuildMode()" id="buildBtn">建築: OFF</button>
</div>

<div id="container">
    <canvas id="mapCanvas" width="520" height="520"></canvas>
</div>

<div id="info-panel">
    <div>
        座標: <span id="pos" class="stat">-</span> | 
        バイオーム: <span id="biome" class="stat">-</span>
        <span id="tierLabel" class="tier-display">-</span>
    </div>
    <div style="margin-top:10px;">
        <textarea id="memoInput" placeholder="座標ログ..." oninput="saveMemo()"></textarea>
    </div>
    <div class="info-row village-info" id="villageArea">集落情報: なし</div>
    <div class="info-row animal-info" id="animalArea"></div>
</div>

<script>
// --- 基本定数 ---
const SIZE = 65; 
const TILE_SIZE = 8;
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

let heightMap, humidityMap, riverMap, villages = [], roadMap, animals = [], bases = [];
let buildMode = false, vAxis = false, selectedPos = { x: 32, y: 32 };

// --- マルチバース名称定義 ---
const MULTIVERSE_DATA = {
    LOW: {
        tierName: "低現実度 (Ethereal)",
        biomes: { deep: "アビス", shallow: "エーテル流", beach: "銀の砂浜", mountain: "浮遊島", forest: "幻影の森", plain: "極光の野" },
        animals: { COW: "霊体牛", SHEEP: "雲羊", PIG: "マナの塊", CHICKEN: "火粉鳥", WOLF: "影を噛む者", FISH: "発光魚" },
        roles: ["祈祷師", "星読み", "精霊使い", "封印師"]
    },
    MED: {
        tierName: "中現実度 (Material)",
        biomes: { deep: "深海", shallow: "浅瀬", beach: "砂浜", mountain: "高山", forest: "森林", plain: "平原" },
        animals: { COW: "牛", SHEEP: "羊", PIG: "豚", CHICKEN: "鶏", WOLF: "狼", FISH: "魚" },
        roles: ["農夫", "狩人", "職人", "司祭"]
    },
    HIGH: {
        tierName: "高現実度 (Cyber)",
        biomes: { deep: "廃液プール", shallow: "冷却層", beach: "破砕シリコン", mountain: "摩天楼", forest: "データ網", plain: "金属平野" },
        animals: { COW: "重機獣", SHEEP: "ファイバー羊", PIG: "ドローン", CHICKEN: "監視ポッド", WOLF: "抹消ユニット", FISH: "超伝導体" },
        roles: ["技術者", "演算士", "ハッカー", "監査官"]
    }
};

// --- ERDエンジン (そのまま維持) ---
const ERD = {
    emotionData: ["憂鬱", "疲れ", "リラックス", "惨め", "混乱", "嬉しい", "緊張", "覚醒", "感動", "悲しい", "眠たい", "落ち着き", "イライラ", "平穏", "満足", "怒り", "興奮", "歓喜", "うんざり", "無関心", "安心", "不快", "達観", "楽しい", "警戒", "驚き", "感謝"],
    clampIndex: (v) => v <= -0.33 ? 0 : (v >= 0.33 ? 2 : 1),
    analyzeEmotion: (input, id) => {
        const s = id;
        const getW = (o) => seededRandom(s + o) * 2 - 1;
        let i = [0,0,0,0].map((_,idx)=> (input.a*getW(idx*3)) + (input.b*getW(idx*3+1)) + (input.hr*getW(idx*3+2)));
        let o = [0,0,0].map((_,idx)=> (i[0]*getW(12+idx*4)) + (i[1]*getW(13+idx*4)) + (i[2]*getW(14+idx*4)) + (i[3]*getW(15+idx*4)));
        return ERD.clampIndex(o[0]) + (ERD.clampIndex(o[1]) * 3) + (ERD.clampIndex(o[2]) * 9);
    },
    getMovementVector: (idx) => {
        const emo = ERD.emotionData[idx];
        if (["興奮", "歓喜", "怒り", "警戒", "驚き"].includes(emo)) return { dx: Math.floor(Math.random()*3)-1, dy: Math.floor(Math.random()*3)-1 };
        if (["落ち着き", "平穏", "眠たい", "無関心"].includes(emo)) return { dx: 0, dy: 0 };
        return Math.random() > 0.6 ? { dx: Math.floor(Math.random()*3)-1, dy: Math.floor(Math.random()*3)-1 } : { dx: 0, dy: 0 };
    }
};

const ANIMAL_TYPES = {
    COW: { color: "#2a2a2a", maxAge: 200, spawn: (h, hum) => h > 0.45 && h < 0.65 && hum > 0.4 },
    SHEEP: { color: "#ffffff", maxAge: 150, spawn: (h, hum) => h > 0.45 && h < 0.75 && hum < 0.6 },
    PIG: { color: "#ffc0cb", maxAge: 150, spawn: (h, hum) => h > 0.45 && h < 0.6 && hum > 0.5 },
    CHICKEN: { color: "#ffffcc", maxAge: 80, spawn: (h, hum) => h > 0.45 && h < 0.7 },
    WOLF: { color: "#a9a9a9", maxAge: 240, spawn: (h, hum) => h > 0.5 && hum > 0.3 && hum < 0.8 },
    FISH: { color: "#add8e6", maxAge: 60, spawn: (h, hum) => h < 0.4 }
};

// --- ヘルパー ---
function seededRandom(seed) { let x = Math.sin(seed) * 10000; return x - Math.floor(x); }

function calculateHP(stats) {
    return (stats.club * 10) + (stats.spade * 10);
}

function calculateStamina(stats) {
    // 行動力：spade + heart
    return (stats.spade * 15) + (stats.heart * 15);
}

function trumpCheck(stat) {
    const roll = Math.floor(Math.random() * 14) + 1;

    if (roll === 14) return "fumble";
    if (roll <= stat) {
        return Math.random() < 0.25 ? "critical" : "success";
    }
    return "fail";
}

function getTier() {
    const x = parseInt(document.getElementById('axisX').value);
    if (x <= 7) return "LOW";
    if (x <= 14) return "MED";
    return "HIGH";
}

function diamondSquare(size, roughness, seed) {
    let map = Array.from({ length: size }, () => new Float32Array(size));
    let s = seed; const getRand = () => { s += 0.1; return seededRandom(s); };
    map[0][0] = getRand(); map[0][size-1] = getRand(); map[size-1][0] = getRand(); map[size-1][size-1] = getRand();
    for (let side = size - 1; side >= 2; side /= 2) {
        let half = side / 2, scale = roughness * side;
        for (let y = half; y < size; y += side) for (let x = half; x < size; x += side) {
            map[y][x] = (map[y-half][x-half] + map[y-half][x+half] + map[y+half][x-half] + map[y+half][x+half]) / 4 + (getRand()*2-1)*scale;
        }
        for (let y = 0; y < size; y += half) for (let x = (y + half) % side; x < size; x += side) {
            let avg = 0, count = 0;
            [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dy,dx]) => {
                let ny=y+dy*half, nx=x+dx*half;
                if(ny>=0&&ny<size&&nx>=0&&nx<size){ avg+=map[ny][nx]; count++; }
            });
            map[y][x] = (avg/count) + (getRand()*2-1)*scale;
        }
    }
    return map;
}

// --- システムロジック ---
function createVillagerData(seed) {
    const tier = getTier();
    const data = MULTIVERSE_DATA[tier];
    const id = Math.floor(seededRandom(seed) * 1000000);
    const names = ["アル", "ベータ", "ガマ", "デル", "エプ", "ゼタ", "イオ"];
    const brainInput = { a: seededRandom(seed+1), b: seededRandom(seed+2), hr: seededRandom(seed+3) };
    return {
        id, name: names[Math.floor(seededRandom(seed+4)*names.length)] + "・" + id.toString().slice(-3),
        role: data.roles[Math.floor(seededRandom(seed+5)*data.roles.length)],
        sex: seededRandom(seed+6)>0.5?"M":"F", age: Math.floor(seededRandom(seed+7)*40)+18,
        brainInput, emotionIdx: ERD.analyzeEmotion(brainInput, id)
    };
}

function generateRiverAndVillages(hMap, seed) {
    let rMap = Array.from({ length: SIZE }, () => new Int8Array(SIZE).fill(0));
    let vList = [], s = seed;
    let startX = 32, startY = 32;
    let current = {x: startX, y: startY};
    for (let i = 0; i < 400; i++) {
        rMap[current.y][current.x] = 1;
        let neighbors = [[0,1],[0,-1],[1,0],[-1,0]].map(([dy,dx])=>({x:current.x+dx, y:current.y+dy}))
                  .filter(p=>p.x>=0&&p.x<SIZE&&p.y>=0&&p.y<SIZE)
                  .sort((a,b)=> hMap[a.y][a.x] - hMap[b.y][b.x]);
        let n = neighbors[0];
        if(!n || hMap[n.y][n.x] < 0.3) break;
        current = n;
    }
    for (let i = 0; i < 50; i++) {
        let vx = Math.floor(seededRandom(s++) * SIZE), vy = Math.floor(seededRandom(s++) * SIZE);
        if (hMap[vy][vx] > 0.46 && hMap[vy][vx] < 0.6) {
            let residents = [];
            const popSize = Math.floor(seededRandom(s++) * 12) + 5; 
            for(let j = 0; j < popSize; j++) residents.push(createVillagerData(s++));
            vList.push({ x: vx, y: vy, residents: residents }); 
            if (vList.length >= 3) break;
        }
    }
    return {rMap, vList};
}

function generateRoads(vList, hMap) {
    roadMap = Array.from({ length: SIZE }, () => new Int8Array(SIZE).fill(0));
    if (vList.length < 2) return;
    for (let i = 0; i < vList.length - 1; i++) {
        let curr = { x: vList[i].x, y: vList[i].y }, end = vList[i+1];
        let timeout = 0;
        while ((curr.x !== end.x || curr.y !== end.y) && timeout < 200) {
            timeout++;
            let next = { x: curr.x, y: curr.y }, minDist = Infinity;
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    if (dx === 0 && dy === 0) continue;
                    let nx = curr.x + dx, ny = curr.y + dy;
                    if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE) {
                        // 海(0.4以下)を避ける重み付け
                        let cost = hMap[ny][nx] < 0.4 ? 50 : 1; 
                        let d = Math.sqrt((nx-end.x)**2 + (ny-end.y)**2) + cost;
                        if (d < minDist) { minDist = d; next = { x: nx, y: ny }; }
                    }
                }
            }
            curr = next;
            if (hMap[curr.y][curr.x] >= 0.4) roadMap[curr.y][curr.x] = 1; // 陸地のみ道を引く
        }
    }
}

function createAnimalObject(type, x, y, s) {
    const id = Date.now() + Math.floor(seededRandom(s)*1000);
    const brainInput = { a: seededRandom(s+10), b: seededRandom(s+20), hr: seededRandom(s+30) };
    return {
        id,
        type,
        x,
        y,

        state: "wild",

        tamed: false,
        sex: seededRandom(s+40)>0.5?"M":"F",
        age: Math.floor(seededRandom(s+50)*10),

        brainInput,
        emotionIdx: ERD.analyzeEmotion(brainInput, id),
        breedCooldown: 0
    };
}

function getBiome(h, hum) {
    const tier = MULTIVERSE_DATA[getTier()].biomes;
    if (h < 0.3) return { name: tier.deep, color: "#000044" };
    if (h < 0.4) return { name: tier.shallow, color: "#0044bb" };
    if (h < 0.45) return { name: tier.beach, color: "#d2b48c" };
    if (h > 0.8) return { name: tier.mountain, color: "#ffffff" };
    return hum > 0.5 ? { name: tier.forest, color: "#004400" } : { name: tier.plain, color: "#228b22" };
}

// --- JSON出力 ---
function downloadEntityJSON(data, type) {

    let sheet;

    const desc = `村人 / 職業:${data.role}`;

    const stats = {
        spade: Math.floor(data.brainInput.a * 10) + 1,
        diamond: Math.floor(data.brainInput.b * 10) + 1,
        club: Math.floor(data.brainInput.hr * 10) + 1,
        heart: (data.id % 10) + 1
    };

    sheet = {
        name: data.name,
        description: desc,
        image_url: "",
        origin_system: "Terrain Engine",
        base_stats: stats,
        systems_config: {
            "Terrain Engine":{
                stat_names:{
                    spade:"STR",
                    diamond:"PER",
                    club:"DEX",
                    heart:"CHA",
                },
                equipment:{},
                storage:{
                    backpack:[],
                    warehouse:[]
                }
            }
        }
    };

    const blob = new Blob([JSON.stringify(sheet, null, 2)], {type: "application/json"});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${type}_${sheet.name}.json`;
    a.click();
}

// --- 生成コア ---
function generateMap(isImport = false) {
    const ax = parseInt(document.getElementById('axisX').value);
    const ay = parseInt(document.getElementById('axisY').value);
    const az = parseInt(document.getElementById('axisZ').value);
    const aw = parseInt(document.getElementById('axisW').value);
    const seed = parseInt(document.getElementById('seedInput').value);
    
    // 全軸を統合したユニークシード
    const finalSeed = seed + ax + ay + az + aw + (vAxis ? 999 : 0);
    
    heightMap = diamondSquare(SIZE, 0.02, finalSeed);
    humidityMap = diamondSquare(SIZE, 0.03, finalSeed + 500);
    let res = generateRiverAndVillages(heightMap, finalSeed + 1000);
    riverMap = res.rMap; villages = res.vList;
    generateRoads(villages, heightMap);

    if (!isImport) {
        animals = [];
        let s = finalSeed + 2000;
        for(let i=0; i<80; i++) {
            let x = Math.floor(seededRandom(s++) * SIZE), y = Math.floor(seededRandom(s++) * SIZE);
            for(let type in ANIMAL_TYPES) {
                if(ANIMAL_TYPES[type].spawn(heightMap[y][x], humidityMap[y][x])) {
                    animals.push(createAnimalObject(type, x, y, s++));
                    break;
                }
            }
        }
    }
    updateUI();
}

function randomGenerate() {
    document.getElementById('axisX').value = Math.floor(Math.random()*21)+1;
    document.getElementById('axisY').value = Math.floor(Math.random()*1000);
    document.getElementById('seedInput').value = Math.floor(Math.random()*99999);
    generateMap();
}

function toggleV() { vAxis = !vAxis; document.getElementById('vBtn').innerText = "V: " + (vAxis?"ON":"OFF"); document.getElementById('vBtn').classList.toggle('v-active'); generateMap(); }
function toggleBuildMode() { buildMode = !buildMode; const b = document.getElementById('buildBtn'); b.innerText = "建築: " + (buildMode?"ON":"OFF"); b.style.background = buildMode?"#ff4400":"#884400"; }

function draw() {
    ctx.clearRect(0,0,520,520);
    for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) {
        ctx.fillStyle = getBiome(heightMap[y][x], humidityMap[y][x]).color;
        ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        if (roadMap[y][x]) { ctx.fillStyle = "#554433"; ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); }
        if (riverMap[y][x]) { ctx.fillStyle="#00ffff"; ctx.fillRect(x*TILE_SIZE+2,y*TILE_SIZE+2,4,4); }
    }
    bases.forEach(b => { ctx.font = "12px serif"; ctx.fillText("🏠", b.x*TILE_SIZE, b.y*TILE_SIZE+8); });
    animals.forEach(a => {
        ctx.fillStyle = a.tamed ? "#ff00ff" : (a.age < 5 ? "#ffff00" : ANIMAL_TYPES[a.type].color);
        if(a.sex==="M") ctx.fillRect(a.x*TILE_SIZE+2, a.y*TILE_SIZE+2, 4, 4);
        else { ctx.beginPath(); ctx.arc(a.x*TILE_SIZE+4, a.y*TILE_SIZE+4, 2, 0, 7); ctx.fill(); }
    });
    villages.forEach(v => { ctx.fillStyle = "#ff0077"; ctx.beginPath(); ctx.arc(v.x*TILE_SIZE+4, v.y*TILE_SIZE+4, 4, 0, 7); ctx.fill(); });
    if (player) {
        ctx.fillStyle = player.color;
        ctx.shadowBlur = 10; ctx.shadowColor = "#00ff00";
        ctx.fillRect(player.x * TILE_SIZE, player.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        ctx.shadowBlur = 0;
        ctx.fillStyle = "white"; ctx.font = "10px Arial";
        ctx.fillText(player.name, player.x * TILE_SIZE - 5, player.y * TILE_SIZE - 5);
    }
    // リモートプレイヤーの描画
    Object.values(remotePlayers).forEach(p => {
        ctx.fillStyle = "#ff00ff";
        ctx.fillRect(p.x * TILE_SIZE, p.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        ctx.fillText(p.name, p.x * TILE_SIZE - 5, p.y * TILE_SIZE - 5);
    });
    ctx.strokeStyle = "#ffff00"; ctx.strokeRect(selectedPos.x*TILE_SIZE, selectedPos.y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
}

// --- 生態系ループ (そのまま維持) ---
setInterval(() => {
    if(!heightMap) return;
    let newBabies = [], deadIds = new Set();
    const counts = {}; animals.forEach(a => counts[a.type] = (counts[a.type] || 0) + 1);

    animals.forEach(a => {
        const def = ANIMAL_TYPES[a.type];
        a.age += 1; if(a.age > (a.tamed ? def.maxAge*5 : def.maxAge)) deadIds.add(a.id);
        
        let vec = ERD.getMovementVector(a.emotionIdx);
        let nx = a.x + vec.dx, ny = a.y + vec.dy;
        // 地形判定: 陸上生物は陸(>0.4)のみ、魚は水(<0.4)のみに移動を制限
        if(nx>=0&&nx<SIZE&&ny>=0&&ny<SIZE) {
            const h = heightMap[ny][nx];
            if((a.type==='FISH' && h < 0.4) || (a.type!=='FISH' && h >= 0.4)) { a.x=nx; a.y=ny; }
        }

        if (a.sex === "F" && a.breedCooldown === 0 && counts[a.type] < 20) {
            let p = animals.find(p => p.type === a.type && p.sex === "M" && Math.abs(p.x - a.x) <= 1);
            if(p) { newBabies.push(createAnimalObject(a.type, a.x, a.y, Math.random())); a.breedCooldown = 40; }
        } else if(a.breedCooldown>0) a.breedCooldown--;
    });
    animals = animals.filter(a => !deadIds.has(a.id)).concat(newBabies);
    
    // 絶滅防止ロジック (そのまま維持)
    Object.keys(ANIMAL_TYPES).forEach(type => {
        if ((counts[type] || 0) <= 5) {
            for(let i=0; i<50; i++) {
                let rx = Math.floor(Math.random()*SIZE), ry = Math.floor(Math.random()*SIZE);
                if (ANIMAL_TYPES[type].spawn(heightMap[ry][rx], humidityMap[ry][rx])) {
                    animals.push(createAnimalObject(type, rx, ry, Math.random())); break;
                }
            }
        }
    });
    animals.forEach(a => a.processed = false);
    // スタミナ回復
    if (player.stamina < player.maxStamina) {
        player.stamina += 1;
    }
    // HP回復（肉がある場合）
    if (player.inventory.meat > 0 && player.food < 100 ) {
        player.food += 2;
        player.inventory.meat -= 1;

        if (player.food > 100) player.food = 100;
    }else if (player.food > 0 && player.hp < player.maxHP){
        player.hp += 2;
        player.food -= 1;

        if (player.hp > player.maxHP) player.hp = player.maxHP;
    }
    if (player.hp <= 0) {
        alert("あなたは死亡しました");
        player = null;
        return;
    }
}, 1500);

canvas.addEventListener('click', (e) => {
    const r = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - r.left) / TILE_SIZE);
    const y = Math.floor((e.clientY - r.top) / TILE_SIZE);

    const DEBUG_MODE = false;

    selectedPos = { x, y };

    if (buildMode) {

        if (!player) {
            alert("プレイヤーがいません");
            return;
        }

        // 木材チェック
        if (!player.inventory || player.inventory.wood === undefined) {
            player.inventory = player.inventory || {};
            player.inventory.wood = 0;
        }

        const COST = 5; // 建築コスト

        const idx = bases.findIndex(b => b.x === x && b.y === y);

        if (idx === -1) {
            // 建築（設置）
            if (player.inventory.wood < COST) {
                alert("木材が足りません");
                return;
            }

            player.inventory.wood -= COST;
            bases.push({ x, y });

        } else {
            // 撤去（返却ありにするなら）
            bases.splice(idx, 1);
            player.inventory.wood += Math.floor(COST / 2); // 半分返却
        }

        syncBuildData();
    }else {
        if (DEBUG_MODE) {
            let a = animals.find(ani => ani.x === x && ani.y === y);
            if (a) a.tamed = !a.tamed;
        }
    }
    updateUI();
});

// 建築データを全プレイヤーに送信する関数
function syncBuildData() {
    const data = { type: "build_sync", data: bases };
    
    // ホストなら全員に、ゲストならホストに送る
    if (isHost()) {
        relayToAll(data, null); 
    } else {
        // ホスト（最初の接続先）を探して送る
        for (let id in connections) {
            connections[id].send(data);
        }
    }
}

function updateUI() {
    const {x,y} = selectedPos;
    const tier = getTier();
    const tierData = MULTIVERSE_DATA[tier];

    const tl = document.getElementById('tierLabel');
    tl.innerText = tierData.tierName; tl.className = "tier-display tier-" + tier.toLowerCase();

    let v = villages.find(v => v.x === x && v.y === y);

    } else vArea.innerText = "集落情報: なし";

        document.getElementById('animalArea').innerText += `
    HP:${player.hp}/${player.maxHP}

    MEAT:${player.inventory.meat}

    }

        player.tamedWolves.forEach((w, i) => {
            wolfHTML += `
            ${i+1}: ${w.type}
            <button onclick='exportWolf(${i})'>JSON出力</button><br>

}

// --- プレイヤー管理セクション ---
let player = null; // ローカルプレイヤー
let remotePlayers = {}; // 他プレイヤー用（WebRTC）

let turn = 0;
let day = 1;

function nextTurn() {
    turn++;
    player.stamina--;

    if (turn % 5 === 0) player.food--;

    if (player.food <= 0) player.hp--;

    if (turn >= 120) {
        turn = 0;
        day++;
    }
}

// キャラJSON読み込みボタンの作成（controlsの中に追加）
const spawnBtn = document.createElement('button');
spawnBtn.innerText = "キャラ読込・スポーン";
spawnBtn.style.background = "#0055aa";
spawnBtn.onclick = () => document.getElementById('playerInput').click();
document.getElementById('controls').appendChild(spawnBtn);
const exportBtn = document.createElement('button');
exportBtn.innerText = "キャラ保存(JSON)";
exportBtn.style.background = "#884400";
exportBtn.onclick = exportPlayerJSON;

document.getElementById('controls').appendChild(exportBtn);

const pInput = document.createElement('input');
pInput.type = 'file';
pInput.id = 'playerInput';
pInput.style.display = 'none';
pInput.onchange = importPlayerJSON;
document.body.appendChild(pInput);

function derivePlayerStats(base) {
    return {
        maxHP: base.club * 5 + base.spade * 2,
        hp: base.club * 5 + base.spade * 2,
        maxStamina: base.spade * 3 + base.club * 2,
        stamina: base.spade * 3 + base.club * 2,
        food: 100
    };
}

function importPlayerJSON(e) {
    const reader = new FileReader();

    reader.onload = (event) => {
        try {
            const data = JSON.parse(event.target.result);

            if (!data.base_stats) {
                alert("base_statsがありません");
                return;
            }

            // 🔴 survivalの安全取得
            let survival = {};
            if (data.terrain_engine && data.terrain_engine.survival) {
                survival = data.terrain_engine.survival;
            }

            player = {
                id: "local-" + Date.now(),
                name: data.name || "Unknown",
                x: 32,
                y: 32,
                stats: data.base_stats,
                color: "#00ff00",

                originalData: data,

                hp: calculateHP(data.base_stats),
                maxHP: calculateHP(data.base_stats),

                stamina: calculateStamina(data.base_stats),
                maxStamina: calculateStamina(data.base_stats),
                food: survival.food !== undefined ? survival.food : 100,

                inventory: survival.inventory ? survival.inventory : {
                    wood: 0,
                    meat: 0
                },

                tamedWolves: survival.tamed_wolves ? survival.tamed_wolves : []
            };

            // 位置復元
            if (survival.position) {
                player.x = survival.position.x;
                player.y = survival.position.y;
            }

            console.log("読み込み成功", player);

        }catch (err) {
            console.error("エラー詳細:", err);
            alert(err.message);
        }
    };

    reader.readAsText(e.target.files[0]);
    if (!player.maxHP) player.maxHP = calculateHP(player.stats);
    if (!player.maxStamina) player.maxStamina = calculateStamina(player.stats);
}
// window全体で入力を監視
window.addEventListener('keydown', (e) => {
    if (player.stamina <= 0) {
        console.log("スタミナ切れ");
        return;
    }
    // プレイヤーがいない、または入力欄にフォーカスがある時は処理しない
    if (!player || ["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) {
        return;
    }

    const key = e.key.toLowerCase();
    let nx = player.x;
    let ny = player.y;

    // スタミナ消費
    player.stamina -= 1;
    if (player.stamina < 0) player.stamina = 0;

    // WASD移動
    if (key === 'w') { ny--; e.preventDefault(); }
    if (key === 's') { ny++; e.preventDefault(); }
    if (key === 'a') { nx--; e.preventDefault(); }
    if (key === 'd') { nx++; e.preventDefault(); }

    // 地形判定
    if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE) {
        if (heightMap[ny][nx] >= 0.0) {
            onPlayerMove(nx, ny);
            broadcastPosition();
        }
    }
}, { passive: false }); // preventDefaultを有効にするためのオプション

function onPlayerMove(nx, ny) {
    if (!player) return;

    player.x = nx;
    player.y = ny;

    nextTurn();

    const animal = animals.find(a => a.x === nx && a.y === ny);
    if (animal) {
        handleAnimalEvent(animal);
        return;
    }

    const biome = getBiome(heightMap[ny][nx], humidityMap[ny][nx]).name;
    handleGather(biome);

    const village = villages.find(v => v.x === nx && v.y === ny);
    if (village) handleTrade(village);
}

function handleAnimalEvent(animal) {

    // --- 既に処理済み防止 ---
    if (animal.processed) return;
    animal.processed = true;

    // --- 狼 ---
    if (animal.type === "WOLF") {

        if (animal.state === "tamed") return;

        if (animal.state === "hostile") {
            player.hp -= 2;
            return;
        }

        if (player.tamedWolves.length >= 2) return;

        const result = trumpCheck(player.stats.heart);

        if (result === "fumble") {
            animal.state = "hostile";
        }
        else if (result === "success" || result === "critical") {
            animal.state = "tamed";
            animal.tamed = true;
            player.tamedWolves.push(animal);
        }

        return;
    }

    // --- 通常動物（狩り） ---
    const result = trumpCheck(player.stats.spade);

    if (result === "success") {
        player.inventory.meat++;
        animals = animals.filter(a => a.id !== animal.id);
    }

    if (result === "fumble") {
        player.hp -= 2;
    }
}

function handleGather(biome) {
    const forestBiomes = ["森林", "幻影の森", "データ網"];

    if (!forestBiomes.includes(biome)) return;

    const result = trumpCheck(player.stats.club);

    if (result === "success") player.inventory.wood++;
    if (result === "critical") player.inventory.wood += 3;
}

function handleTrade(village) {
    const result = trumpCheck(player.stats.diamond);

    if (result === "success" && player.inventory.wood > 0) {
        player.inventory.wood--;
        player.inventory.meat += 2;
    }
}

// --- PeerJS Listen Server システム ---
let peer = null;
let connections = {}; // 接続中の全コネクション

// UIを更新
const rtcControls = document.getElementById('rtc-wrapper') || document.createElement('div');
rtcControls.id = 'rtc-wrapper';
rtcControls.innerHTML = `
    <div style="margin-top:10px; border-top:1px solid #444; padding-top:10px;">
        <div style="font-size:0.8em; color:#aaa; margin-bottom:5px;">
            Your/Target Room ID: 
            <input type="text" id="targetPeerId" style="width:120px; background:#000; color:#00ffcc; border:1px solid #444; padding:2px 5px;">
        </div>
        <button onclick="startConnection()" style="background:#006655;">このIDに接続 (Guest)</button>
        <div style="font-size:0.7em; color:#888; margin-top:5px;">
            ※Hostは表示されているIDを相手に伝えてください。
        </div>
    </div>
`;
if(!document.getElementById('rtc-wrapper')) document.getElementById('info-panel').appendChild(rtcControls);

// 初期化：ページ読み込み時にPeerオブジェクトを作成
function initPeer() {
    // IDをランダム生成（または固定文字列も可能）
    const myId = 'room-' + Math.floor(Math.random() * 9000 + 1000);
    peer = new Peer(myId);

    peer.on('open', (id) => {
        console.log('My peer ID is: ' + id);
        document.getElementById('targetPeerId').value = id; // 自分のIDを表示
    });

    // 【Host側】Guestからの接続を待ち受け
    peer.on('connection', (conn) => {
        setupDataChannel(conn);
    });

    peer.on('error', (err) => {
        console.error('PeerJS Error:', err);
        alert('通信エラーが発生しました: ' + err.type);
    });
}

// 【Guest側】Hostに接続を開始する
async function startConnection() {
    const targetId = document.getElementById('targetPeerId').value;
    if (!targetId) return alert("接続先IDを入力してください");

    const conn = peer.connect(targetId);
    setupDataChannel(conn);
}

// --- 多人数対応リレーシステム ---
function setupDataChannel(conn) {
    conn.on('open', () => {
        console.log('Connected with: ' + conn.peer);
        connections[conn.peer] = conn;
        
        // 新しく入ってきた人に、現在の全プレイヤー情報を同期させるための合図
        if (player) broadcastPosition();
    });

    conn.on('data', (data) => {
        const msg = typeof data === 'string' ? JSON.parse(data) : data;
        
        // --- 位置同期とタイムスタンプ更新 ---
        if (msg.type === "pos") {
            remotePlayers[msg.id] = { 
                x: msg.x, 
                y: msg.y, 
                name: msg.name,
                lastUpdate: Date.now() // 受信時刻を記録
            };
            if (isHost()) relayToAll(msg, conn.peer);
        }

        // --- 建築同期 ---
        if (msg.type === "build_sync") {
            bases = msg.data; // 建築リストを上書き同期
            if (isHost()) relayToAll(msg, conn.peer); // 他のゲストにも転送
        }
    });

    conn.on('close', () => {
        delete connections[conn.peer];
        // 誰かが離脱したことを他全員に知らせる処理（任意）
    });
}

// ホスト判定（最初にIDを発行した側かどうか）
function isHost() {
    // 自分のPeer IDがtargetPeerIdに入力されているものと同じならホストとみなす簡易判定
    const myId = peer ? peer.id : "";
    const displayedId = document.getElementById('targetPeerId').value;
    return myId === displayedId;
}

// 自分と、送信元（senderPeerId）以外の全員にデータを転送
function relayToAll(msg, senderPeerId) {
    for (let id in connections) {
        if (id !== senderPeerId && connections[id].open) {
            connections[id].send(msg);
        }
    }
}

// 送信処理の修正（connectionsオブジェクトをループ）
function broadcastPosition() {
    if (!player) return;
    const data = {
        type: "pos", id: player.id, x: player.x, y: player.y, name: player.name
    };

    for (let id in connections) {
        if (connections[id].open) {
            connections[id].send(data);
        }
    }
}

// ページロード時に初期化を実行
initPeer();

// ゴーストプレイヤーの掃除（1秒ごとにチェック）
setInterval(() => {
    const now = Date.now();
    const timeout = 5000; // 5秒更新がなければ削除

    for (let id in remotePlayers) {
        if (now - remotePlayers[id].lastUpdate > timeout) {
            console.log(`Player timeout: ${remotePlayers[id].name}`);
            delete remotePlayers[id];
        }
    }
}, 1000);

generateMap();

            diamond: 8,

        },
        systems_config: {

                    spade:"STR",
                    diamond:"PER",
                    club:"DEX",

                },
                equipment:{},

                    backpack:[],
                    warehouse:[]
                }
            }

        }

function exportPlayerJSON() {
    if (!player) {
        alert("プレイヤーが存在しません");
        return;
    }

    // 元データをディープコピー
    const base = JSON.parse(JSON.stringify(player.originalData || {}));

    // --- 既存データを壊さず追記 ---
    base.origin_system = base.origin_system || "Terrain Engine (Multiverse)";

    // ステータス（Trump TRPG Systems互換）
    base.base_stats = player.stats;

    // --- サバイバル拡張データ ---
    base.terrain_engine = base.terrain_engine || {};

    base.terrain_engine.survival = {
        hp: player.hp,
        stamina: player.stamina,
        food: player.food,
        position: { x: player.x, y: player.y },
        inventory: player.inventory,
        tamed_wolves: player.tamedWolves.map(w => ({
            id: w.id,
            type: w.type,
            stats: w.stats
        }))
    };

    // JSON出力
    const blob = new Blob([JSON.stringify(base, null, 2)], { type: "application/json" });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${player.name}_full.json`;
    a.click();
}
